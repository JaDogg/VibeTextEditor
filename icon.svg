<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Drop shadow -->
  <rect x="14" y="12" width="70" height="82" rx="10" fill="#00000018"/>

  <!-- Paper body -->
  <rect x="12" y="8" width="70" height="82" rx="10" fill="#F7F7F7"/>

  <!-- Dog-eared top-right corner cut -->
  <polygon points="62,8 82,8 82,28" fill="#F7F7F7"/>
  <polygon points="62,8 82,28 62,28" fill="#D8D8D8"/>
  <line x1="62" y1="8" x2="82" y2="28" stroke="#C0C0C0" stroke-width="1.2"/>

  <!-- Gutter (line number column) -->
  <rect x="12" y="8" width="17" height="82" rx="10" fill="#4A90D9"/>
  <!-- Square off right side of gutter -->
  <rect x="21" y="8" width="8" height="82" fill="#4A90D9"/>
  <!-- Gutter right border -->
  <line x1="29" y1="8" x2="29" y2="90" stroke="#3478BF" stroke-width="1"/>

  <!-- Line number dots in gutter -->
  <circle cx="20" cy="36" r="1.8" fill="white" opacity="0.65"/>
  <circle cx="20" cy="48" r="1.8" fill="white" opacity="0.65"/>
  <circle cx="20" cy="60" r="1.8" fill="white" opacity="0.65"/>
  <circle cx="20" cy="72" r="1.8" fill="white" opacity="0.65"/>

  <!-- Text lines -->
  <line x1="35" y1="36" x2="72" y2="36" stroke="#BBBBBB" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="35" y1="48" x2="72" y2="48" stroke="#BBBBBB" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="35" y1="60" x2="60" y2="60" stroke="#BBBBBB" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="35" y1="72" x2="68" y2="72" stroke="#BBBBBB" stroke-width="2.6" stroke-linecap="round"/>

  <!-- Cursor blink (caret) -->
  <rect x="35" y="30" width="2" height="10" rx="1" fill="#4A90D9" opacity="0.85"/>

  <!-- Paper border -->
  <rect x="12" y="8" width="70" height="82" rx="10" fill="none" stroke="#D0D0D0" stroke-width="1"/>
</svg>
